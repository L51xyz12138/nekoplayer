# ===== NekoPlayer 的 mpv 配置（跨平台）=====

# 用 uosc 现代 UI 替代默认控制条（需安装 uosc 脚本，见项目说明）
osc=no
osd-bar=no
border=no

# 硬件解码（播放时主进程会按平台传更精确的 videotoolbox/d3d11va，避免 auto 逐一探测拖慢启动）
hwdec=auto-safe

# 字幕默认中文优先；音轨用文件自带的默认（原声，不强制中文配音）
slang=chi,zh,chs,sc,zho,cht
# fuzzy=自动挂同目录同名字幕；sub-file-paths=再顺带扫 sub/subs/subtitles 子文件夹（NAS 常把字幕单放一夹）
sub-auto=fuzzy
sub-file-paths=sub:subs:subtitles:Subs:Subtitles

# 播放结束自动关窗
keep-open=no
