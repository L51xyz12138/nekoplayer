name: Build Desktop Apps

# 打三平台的包：手动触发，或推送 v* 标签时自动触发
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# 允许 CI 用内置 GITHUB_TOKEN 创建 / 更新 Release
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate app icon
        run: npm run icons

      # ---------- 自带 mpv（便携版，用户无需自行安装）----------
      # 注：各平台 mpv 分发源 URL 偶有变动，失败不阻断打包（continue-on-error）
      - name: Bundle mpv (Windows)
        if: matrix.platform == 'win'
        continue-on-error: true
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" -Headers @{ "User-Agent" = "nekoplayer" }
          $asset = $rel.assets | Where-Object { $_.name -match "^mpv-x86_64-.*\.7z$" } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv.7z
          7z x mpv.7z -ompv-tmp
          New-Item -ItemType Directory -Force -Path electron/mpv/bin | Out-Null
          Copy-Item (Get-ChildItem -Recurse -Filter mpv.exe -Path mpv-tmp | Select-Object -First 1).FullName electron/mpv/bin/mpv.exe

      - name: Bundle mpv (Linux)
        if: matrix.platform == 'linux'
        continue-on-error: true
        run: |
          mkdir -p electron/mpv/bin
          curl -fL -o electron/mpv/bin/mpv "https://github.com/pkgforge-dev/mpv-AppImage/releases/latest/download/mpv-x86_64.AppImage"
          chmod +x electron/mpv/bin/mpv

      - name: Bundle mpv (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 用 gh（带 token 认证）从官方 release 下载 macOS arm64 build
          gh release download --repo mpv-player/mpv --pattern '*macos-14-arm.zip' --dir mpv-dl
          unzip -q mpv-dl/*.zip -d mpv-tmp
          # zip 内层是 mpv.tar.gz，再解压一层才是 mpv.app
          tar -xzf mpv-tmp/mpv.tar.gz -C mpv-tmp
          echo "=== structure ==="
          find mpv-tmp -maxdepth 2 | head -40
          APP=$(find mpv-tmp -name '*.app' | head -1)
          echo "found app: $APP"
          mkdir -p electron/mpv
          if [ -z "$APP" ]; then echo "!! no .app found:"; find mpv-tmp | head -60; exit 1; fi
          cp -R "$APP" electron/mpv/mpv.app
          # ad-hoc 重签，确保 arm64 上能执行
          codesign --force --deep --sign - electron/mpv/mpv.app
          ls -la electron/mpv/mpv.app/Contents/MacOS

      - name: Build & package
        run: npm run dist:${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NekoPlayer-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore

      # 打了 v* 标签时，从 CHANGELOG 提取该版本更新说明
      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/extract-changelog.mjs ${{ github.ref_name }}

      # 把三平台安装包 + 更新说明发布到 GitHub Release
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          fail_on_unmatched_files: false
